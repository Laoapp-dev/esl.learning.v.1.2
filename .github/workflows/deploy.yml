name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        env:
          # NOTE: vite.config.ts now uses a relative base ('./') so no
          # GITHUB_PAGES_BASE / repo-name env var is needed here anymore —
          # this is what fixes the blank-page-on-GitHub-Pages issue for good,
          # since it no longer depends on the repo name matching anything.
          # Shared vocabulary source — see .env.example / MIGRATION_GUIDE.md.
          # Add these as repo secrets: Settings → Secrets and variables →
          # Actions → New repository secret. They get baked into the static
          # build so EVERY visitor's browser can auto-sync automatically —
          # not just the admin's own device.
          VITE_SHEET_CSV_URL: ${{ secrets.VITE_SHEET_CSV_URL }}
          VITE_SHEET_AUTO_SYNC_MIN: ${{ secrets.VITE_SHEET_AUTO_SYNC_MIN }}
        run: npm run build

      # Copy index.html as 404.html so GitHub Pages serves the SPA on any direct URL
      - name: Add 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
