name: Deploy to Cloudflare Pages

# This is an ALTERNATIVE to deploy.yml (GitHub Pages) — either works on
# its own, or both can run side by side (e.g. GitHub Pages as a mirror).
# See CLOUDFLARE_DEPLOY.md for full setup steps, including the two
# required repo secrets (CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID).
#
# If you'd rather not manage secrets/Actions at all: connect this repo to
# Cloudflare Pages directly in the Cloudflare dashboard instead (Workers &
# Pages → Create → Pages → Connect to Git). Cloudflare then builds and
# deploys automatically on every push with zero YAML — pick that OR this
# workflow, not both, to avoid two competing deploys of the same site.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        env:
          # Shared vocabulary source — see .env.example / MIGRATION_GUIDE.md.
          # Add these as repo secrets (Settings → Secrets and variables →
          # Actions) so every visitor's browser can auto-sync, not just the
          # admin's own device. Optional — leave unset if you only use
          # GitHub Sync / manual CSV import from Admin Panel instead.
          VITE_SHEET_CSV_URL: ${{ secrets.VITE_SHEET_CSV_URL }}
          VITE_SHEET_AUTO_SYNC_MIN: ${{ secrets.VITE_SHEET_AUTO_SYNC_MIN }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # ⚠️ Must exactly match an existing Cloudflare Pages project name.
          # If you already have a live project called "esl-learning", put
          # that name here instead — changing it creates a NEW project with
          # a new *.pages.dev URL rather than updating the existing site.
          projectName: esl-master-vocab
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
